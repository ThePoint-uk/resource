<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QualityHub — QMS Solution Mockup</title>
<style>
  :root{
    --brand:#115EA3; --brand-hover:#0F548C; --brand-2:#0F6CBD; --brand-tint:#EBF3FC;
    --ink:#242424; --ink-2:#424242; --ink-3:#616161; --ink-4:#808080;
    --stroke:#E1E1E1; --stroke-2:#EDEDED; --bg:#F5F5F5; --surface:#FFFFFF; --surface-2:#FAFAFA;
    --ok:#0E700E; --ok-bg:#E7F4E7; --warn:#9A5B00; --warn-bg:#FFF4CE; --danger:#B10E1C; --danger-bg:#FDE7E9;
    --info:#115EA3; --info-bg:#EBF3FC; --neutral:#5C5C5C; --neutral-bg:#F0F0F0; --purple:#5B3D9E; --purple-bg:#F3EEFB;
    --radius:6px; --radius-lg:10px; --shadow:0 1.6px 3.6px rgba(0,0,0,.10),0 .3px .9px rgba(0,0,0,.07);
    --rail:250px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:"Segoe UI","Segoe UI Web (West European)",-apple-system,BlinkMacSystemFont,Roboto,"Helvetica Neue",sans-serif;
    color:var(--ink);background:var(--bg);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  a{color:var(--brand);text-decoration:none}

  .app{display:grid;grid-template-columns:var(--rail) 1fr;grid-template-rows:48px 1fr;height:100vh;grid-template-areas:"brand topbar" "rail main"}
  .topbrand{grid-area:brand;background:var(--brand);color:#fff;display:flex;align-items:center;gap:10px;padding:0 16px;font-weight:600;letter-spacing:.2px}
  .topbrand .logo{width:24px;height:24px;border-radius:5px;background:linear-gradient(135deg,#fff,#cfe4fb);display:grid;place-items:center;color:var(--brand);font-weight:800;font-size:14px}
  .topbar{grid-area:topbar;background:var(--brand);color:#fff;display:flex;align-items:center;gap:14px;padding:0 16px 0 8px}
  .topbar .search{flex:1;max-width:520px;margin:0 auto 0 8px;position:relative}
  .topbar .search input{width:100%;height:30px;border:none;border-radius:var(--radius);padding:0 12px 0 32px;font-size:13px;background:#fff;color:var(--ink)}
  .topbar .search svg{position:absolute;left:9px;top:7px;opacity:.55}
  .topbar .spacer{flex:1}
  .topbar .iconbtn{width:32px;height:32px;border-radius:var(--radius);border:none;background:transparent;color:#fff;display:grid;place-items:center}
  .topbar .iconbtn:hover{background:rgba(255,255,255,.16)}
  .topbar .avatar{width:30px;height:30px;border-radius:50%;background:#fff;color:var(--brand);font-weight:700;display:grid;place-items:center;font-size:12px}
  .archtoggle{display:flex;align-items:center;gap:7px;font-size:12px;color:#fff;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);padding:5px 10px;border-radius:14px;white-space:nowrap}
  .archtoggle.on{background:#fff;color:var(--brand);border-color:#fff}

  .rail{grid-area:rail;background:var(--surface);border-right:1px solid var(--stroke);overflow-y:auto;padding:8px 0}
  .rail .group{padding:14px 16px 4px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-4);font-weight:600}
  .navitem{display:flex;align-items:center;gap:11px;padding:8px 16px;color:var(--ink-2);border-left:3px solid transparent;font-size:13.5px}
  .navitem:hover{background:var(--surface-2)}
  .navitem.active{background:var(--brand-tint);border-left-color:var(--brand);color:var(--brand);font-weight:600}
  .navitem .ic{width:18px;display:grid;place-items:center;opacity:.85}
  .navitem .badge{margin-left:auto;background:var(--danger-bg);color:var(--danger);border-radius:10px;font-size:11px;font-weight:700;padding:1px 7px}
  .navitem.active .badge{background:#fff}

  .main{grid-area:main;overflow-y:auto}
  .pagehead{background:var(--surface);border-bottom:1px solid var(--stroke);padding:16px 28px 0}
  .breadcrumb{font-size:12.5px;color:var(--ink-3);margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .breadcrumb a{color:var(--ink-3)} .breadcrumb a:hover{color:var(--brand)} .breadcrumb .sep{opacity:.5}
  .pagehead h1{margin:2px 0;font-size:22px;font-weight:600;letter-spacing:-.2px}
  .pagehead .sub{color:var(--ink-3);font-size:13px;margin-bottom:14px}
  .cmdbar{display:flex;gap:8px;flex-wrap:wrap}
  .content{padding:22px 28px 60px}

  .btn{height:32px;padding:0 14px;border-radius:var(--radius);border:1px solid var(--stroke);background:var(--surface);color:var(--ink);font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{background:var(--surface-2)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff} .btn.primary:hover{background:var(--brand-hover)}

  .grid{display:grid;gap:16px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .card{background:var(--surface);border:1px solid var(--stroke);border-radius:var(--radius-lg);box-shadow:var(--shadow)}
  .kpi{padding:16px 18px}
  .kpi .label{font-size:12.5px;color:var(--ink-3);display:flex;align-items:center;gap:8px}
  .kpi .num{font-size:30px;font-weight:600;margin-top:6px;line-height:1}
  .kpi .delta{font-size:12px;margin-top:7px;color:var(--ink-3)}
  .kpi .delta.up{color:var(--danger)} .kpi .delta.down{color:var(--ok)} .kpi .delta.flat{color:var(--ink-4)}
  .kpi .ring{width:38px;height:38px;float:right;margin-top:-2px}

  .section{margin-top:22px}
  .section h2{font-size:15px;font-weight:600;margin:0 0 12px;display:flex;align-items:center;gap:9px}
  .section h2 .count{font-size:12px;color:var(--ink-4);font-weight:500}
  .two-col{grid-template-columns:1.4fr 1fr;align-items:start}
  @media(max-width:980px){.two-col{grid-template-columns:1fr}}

  .attn{border:1px solid var(--stroke);border-radius:var(--radius-lg);overflow:hidden}
  .attn .row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--stroke-2);background:var(--surface);cursor:pointer}
  .attn .row:last-child{border-bottom:none} .attn .row:hover{background:var(--surface-2)}
  .attn .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .attn .ttl{font-weight:600;font-size:13.5px} .attn .meta{color:var(--ink-3);font-size:12.5px}
  .attn .when{margin-left:auto;font-weight:600;font-size:12.5px;white-space:nowrap}

  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .field{position:relative}
  .field input,.field select{height:32px;border:1px solid var(--stroke);border-radius:var(--radius);background:var(--surface);font-size:13px;padding:0 10px;color:var(--ink)}
  .field.search input{padding-left:30px;width:260px}
  .field.search svg{position:absolute;left:8px;top:8px;opacity:.5}
  .field select{padding-right:26px;cursor:pointer}
  .muted-count{margin-left:auto;color:var(--ink-4);font-size:12.5px}
  table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--stroke);border-radius:var(--radius-lg);overflow:hidden}
  thead th{text-align:left;font-size:12px;color:var(--ink-3);font-weight:600;padding:10px 14px;background:var(--surface-2);border-bottom:1px solid var(--stroke);user-select:none;cursor:pointer;white-space:nowrap}
  thead th .arrow{font-size:10px;margin-left:4px;opacity:.6}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--stroke-2);font-size:13.5px;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none} tbody tr{cursor:pointer} tbody tr:hover{background:var(--brand-tint)}
  td .id{font-variant-numeric:tabular-nums;color:var(--ink-3);font-size:12.5px}
  td .strong{font-weight:600} td .sub{color:var(--ink-4);font-size:12px}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:11px;white-space:nowrap}
  .pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .pill.ok{color:var(--ok);background:var(--ok-bg)} .pill.warn{color:var(--warn);background:var(--warn-bg)}
  .pill.danger{color:var(--danger);background:var(--danger-bg)} .pill.info{color:var(--info);background:var(--info-bg)} .pill.neutral{color:var(--neutral);background:var(--neutral-bg)}
  .prio{font-size:11.5px;font-weight:700;padding:2px 8px;border-radius:4px}
  .prio.high{color:var(--danger);background:var(--danger-bg)} .prio.med{color:var(--warn);background:var(--warn-bg)} .prio.low{color:var(--neutral);background:var(--neutral-bg)}

  .empty{padding:48px 20px;text-align:center;color:var(--ink-4)}
  .empty .big{font-size:15px;color:var(--ink-3);font-weight:600;margin-bottom:4px}

  .detail{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
  @media(max-width:980px){.detail{grid-template-columns:1fr}}
  .panel{background:var(--surface);border:1px solid var(--stroke);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:16px}
  .panel h3{margin:0 0 14px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
  .kv{display:grid;grid-template-columns:140px 1fr;gap:8px 14px;font-size:13.5px}
  .kv dt{color:var(--ink-3)} .kv dd{margin:0;font-weight:500}
  .descbox{font-size:13.5px;color:var(--ink-2);line-height:1.6;white-space:pre-wrap}

  .timeline{position:relative;padding-left:6px}
  .tl{position:relative;padding:0 0 18px 26px;border-left:2px solid var(--stroke);margin-left:5px}
  .tl:last-child{border-left-color:transparent;padding-bottom:0}
  .tl .node{position:absolute;left:-8px;top:1px;width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid var(--brand)}
  .tl.done .node{background:var(--brand);border-color:var(--brand)} .tl.future .node{border-color:var(--stroke)}
  .tl .t{font-weight:600;font-size:13px} .tl .d{color:var(--ink-3);font-size:12px;margin-top:1px} .tl .who{color:var(--ink-4);font-size:12px}

  .step{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--stroke-2)}
  .step:last-child{border-bottom:none}
  .step .chk{width:18px;height:18px;border-radius:4px;border:2px solid var(--stroke);flex:none;margin-top:1px;display:grid;place-items:center;color:#fff;font-size:11px}
  .step.done .chk{background:var(--ok);border-color:var(--ok)} .step.active .chk{border-color:var(--brand)}
  .step .body .t{font-weight:600;font-size:13.5px} .step .body .m{color:var(--ink-3);font-size:12.5px;margin-top:2px}
  .step .when{margin-left:auto;color:var(--ink-4);font-size:12px;white-space:nowrap}

  .progress{height:8px;border-radius:5px;background:var(--stroke-2);overflow:hidden} .progress>span{display:block;height:100%;border-radius:5px;background:var(--brand)}
  .linkrec{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--stroke-2);font-size:13px}
  .linkrec:last-child{border-bottom:none}
  .linkrec .tag{font-size:11px;font-weight:700;color:var(--ink-4);background:var(--neutral-bg);border-radius:4px;padding:1px 6px}

  .statrow{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
  .stat{padding:15px 18px} .stat .l{font-size:12px;color:var(--ink-3)} .stat .v{font-size:26px;font-weight:600;margin-top:4px} .stat .s{font-size:12px;color:var(--ink-4);margin-top:3px}
  .charts{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
  .chartcard{padding:16px 18px} .chartcard h3{margin:0 0 14px;font-size:14px;font-weight:600}
  .donutwrap{display:flex;align-items:center;gap:18px}
  .legend2{display:flex;flex-direction:column;gap:7px;font-size:12.5px}
  .legend2 span{display:flex;align-items:center;gap:7px} .legend2 i{width:10px;height:10px;border-radius:3px}

  .complibgrid{grid-template-columns:repeat(auto-fit,minmax(330px,1fr))}
  .complib{padding:18px 20px;border-top:3px solid var(--purple)}
  .complib .nm{font-size:15px;font-weight:700;font-family:"Cascadia Code",Consolas,monospace;color:var(--purple)}
  .complib .ty{font-size:11.5px;color:var(--ink-4);margin:3px 0 10px}
  .complib .ds{font-size:13px;color:var(--ink-2);line-height:1.5;margin-bottom:12px}
  .complib .io{font-size:12px;border-top:1px solid var(--stroke-2);padding-top:9px;margin-top:9px}
  .complib .io b{color:var(--ink-3);font-weight:600}
  .complib .used{font-size:11.5px;color:var(--ink-4);margin-top:9px}

  .arch-note{display:none}
  body.show-arch .arch-note{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;background:#FFF8E1;color:#7A5200;border:1px dashed #E0B23B;border-radius:5px;padding:2px 8px;margin:6px 6px 0 0;vertical-align:middle}
  body.show-arch .arch-note.flow{background:#EEF6FF;color:#0A4A86;border-color:#7FB1E0}
  body.show-arch .arch-note.pcf{background:var(--purple-bg);color:var(--purple);border-color:#B79BE0}
  body.show-arch .arch-block{display:block !important}
  .arch-block{display:none}
  .arch-banner{display:none}
  body.show-arch .arch-banner{display:block;background:#FFF8E1;border:1px solid #E0B23B;border-radius:var(--radius);padding:11px 14px;margin-bottom:16px;font-size:12.5px;color:#5C4200}
  body.show-arch .arch-banner b{color:#3d2c00}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;margin-top:10px}
  .legend span{display:inline-flex;align-items:center;gap:5px} .legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
  .footnote{margin-top:36px;padding-top:14px;border-top:1px solid var(--stroke);color:var(--ink-4);font-size:11.5px;max-width:780px}
</style>
</head>

function lineChart(values,color){const w=320,h=130,pad=10;const max=Math.max(...values),min=Math.min(...values),rng=(max-min)||1;const pts=values.map((v,i)=>[pad+i*(w-2*pad)/(values.length-1),h-pad-(v-min)/rng*(h-2*pad)]);const d=pts.map((p,i)=>`${i?'L':'M'}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');const area=`${d} L${pts[pts.length-1][0].toFixed(1)} ${h-pad} L${pts[0][0].toFixed(1)} ${h-pad} Z`;return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:140px">${[.25,.5,.75].map(f=>`<line x1="${pad}" x2="${w-pad}" y1="${pad+f*(h-2*pad)}" y2="${pad+f*(h-2*pad)}" stroke="#EDEDED"/>`).join('')}<path d="${area}" fill="${color}1f"/><path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="${color}"/>`).join('')}</svg>`;}
function donut(pct,color,label){const r=42,c=2*Math.PI*r,off=c*(1-pct/100);return `<svg viewBox="0 0 110 110" style="width:130px;height:130px"><circle cx="55" cy="55" r="${r}" fill="none" stroke="#EDEDED" stroke-width="12"/><circle cx="55" cy="55" r="${r}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 55 55)"/><text x="55" y="52" text-anchor="middle" font-size="22" font-weight="700" fill="#242424">${pct}%</text><text x="55" y="70" text-anchor="middle" font-size="9.5" fill="#616161">${label||''}</text></svg>`;}

function sortRows(rows,cols){const s=state.sort;if(!s.col)return rows;const col=cols.find(c=>c.key===s.col);if(!col)return rows;return [...rows].sort((a,b)=>{let va=col.sortVal?col.sortVal(a):a[col.key],vb=col.sortVal?col.sortVal(b):b[col.key];if(va<vb)return -1*s.dir;if(va>vb)return 1*s.dir;return 0;});}
function tableHTML(rows,cols,openRoute){
  if(rows.length===0)return `<div class="empty"><div class="big">Nothing to show</div>No records match your filters. Clear the search or filters to see everything.</div>`;
  const th=cols.map(c=>`<th data-sort="${c.key}">${c.label}${state.sort.col===c.key?`<span class="arrow">${state.sort.dir>0?'▲':'▼'}</span>`:''}</th>`).join('');
  const body=rows.map(rw=>`<tr data-open="${openRoute}" data-id="${rw.id}">${cols.map(c=>`<td>${c.render(rw)}</td>`).join('')}</tr>`).join('');
  return `<table><thead><tr>${th}</tr></thead><tbody>${body}</tbody></table>`;
}
function renderList(id){
  const m=MODULES[id];
  const f=state.filters[id]||{};

  let rows=m.data.filter(r=>{
    for(const flt of m.filters){const v=f[flt.key]||'all';if(v!=='all'&&String(flt.value(r))!==v)return false;}
    if(q){const hay=m.search.map(k=>r[k]).join(' ').toLowerCase();if(!hay.includes(q))return false;}

    ${m.filters.map(flt=>{const cur=f[flt.key]||'all';const opts=['all',...(flt.opts||[...new Set(m.data.map(flt.value))])];return `<div class="field"><select id="flt_${flt.key}">${opts.map(o=>`<option value="${o}" ${o===cur?'selected':''}>${o==='all'?flt.allLabel:o}</option>`).join('')}</select></div>`;}).join('')}
    <span class="muted-count">${rows.length} of ${m.data.length}</span>
  </div>`;
  return head([{t:m.title}],m.h1,m.sub,m.cmds)+`<div class="content">${m.chips||''}<div class="arch-block" style="height:8px"></div>${toolbar}${tableHTML(rows,m.columns,id)}</div>`;
}

function capaDetail(id){const c=DATA.capa.find(x=>x.id===id);if(!c)return notFound('capa');const stages=['Open','Investigation','Action in Progress','Effectiveness Check','Closed'];
  return head([{t:'CAPA',nav:'capa'},{t:c.id}],c.title,`${c.id} · ${c.source} · Priority ${c.prio}`,[{t:'Update action',cls:'primary',icon:'✎'},{t:'Add task'},{t:'Escalate'},{t:'Close CAPA'}])+`
  <div class="content"><div class="detail"><div>
    <div class="panel"><h3>Problem statement</h3><div class="descbox">${c.title}.\n\nDetected via ${c.source.toLowerCase()}. Initial impact assessment completed and potentially affected product placed on hold. This CAPA tracks containment, root-cause analysis, corrective and preventive actions, and effectiveness verification before closure.</div></div>
    <div class="panel"><h3>Root cause analysis</h3><div class="descbox">Method: 5-Why + Fishbone (Man / Machine / Method / Material).\nIdentified cause: ${rootCause(c)}\nVerification: trend reviewed across last 12 batches; confirmed systemic, not isolated.</div>${SP('rich-text + attachment columns')}</div>
    <div class="panel"><h3>Action plan</h3>
      <div class="step done"><span class="chk">✓</span><div class="body"><div class="t">Immediate correction</div><div class="m">Quarantine affected batches · ${c.owner}</div></div><span class="when">Done</span></div>
      <div class="step ${c.stage>=3?'done':'active'}"><span class="chk">${c.stage>=3?'✓':''}</span><div class="body"><div class="t">Corrective action</div><div class="m">Revise SOP & retrain operators</div></div><span class="when">${c.stage>=3?'Done':'In progress'}</span></div>
      <div class="step ${c.stage>=4?'done':c.stage===3?'active':''}"><span class="chk">${c.stage>=4?'✓':''}</span><div class="body"><div class="t">Preventive action</div><div class="m">Add in-process control check</div></div><span class="when">${c.stage>=4?'Done':rel(c.due)}</span></div>
      <div class="step ${c.stage>=5?'done':c.stage===4?'active':''}"><span class="chk">${c.stage>=5?'✓':''}</span><div class="body"><div class="t">Effectiveness check</div><div class="m">Verify no recurrence over 3 batches</div></div><span class="when">${c.stage>=5?'Verified':c.stage===4?'Due':'Pending'}</span></div>
      ${FLOW('each task = "CAPA Actions" item; overdue triggers escalation')}${PCF('QmsStageChecklist (PCF)')}</div>
  </div><div>
    <div class="panel"><h3>Status</h3><dl class="kv">
      <dt>Stage</dt><dd>${pill(capaStatus(c.status),c.status)}</dd><dt>Owner</dt><dd>${c.owner}</dd><dt>Source</dt><dd>${c.source}</dd>
      <dt>Priority</dt><dd>${prioTag(prioCls(c.prio),c.prio)}</dd><dt>Due date</dt><dd>${fmt(c.due)} ${daysFrom(c.due)<0&&c.status!=='Closed'?pill('danger',rel(c.due)):''}</dd></dl></div>
    <div class="panel"><h3>Lifecycle</h3><div class="timeline">${stages.map((s,i)=>`<div class="tl ${i<c.stage?'done':i===c.stage?'':'future'}"><span class="node"></span><div class="t">${s}</div><div class="d">${i<c.stage?'Complete':i===c.stage?'Current':'Pending'}</div></div>`).join('')}</div>${PCF('QmsLifecycleTimeline (PCF)')}</div>
    <div class="panel"><h3>Linked records</h3>${c.source==='Deviation'||c.source==='Nonconformance'?`<div class="linkrec"><span class="tag">NCR</span> NCR-2026-058 <span style="margin-left:auto">${pill('warn','Investigating')}</span></div>`:''}<div class="linkrec"><span class="tag">DOC</span> SOP affected <span style="margin-left:auto">${pill('info','Change raised')}</span></div><div class="linkrec"><span class="tag">TRAIN</span> Retraining <span style="margin-left:auto">${pill('warn','Assigned')}</span></div></div>
  </div></div></div>`;
}

/* ---------------- Dashboard ---------------- */
function dashboardView(){
  const openCapa=DATA.capa.filter(c=>c.status!=='Closed').length;
  const overdueCapa=DATA.capa.filter(c=>c.status!=='Closed'&&daysFrom(c.due)<0).length;
  const docsReview=DATA.documents.filter(d=>['In Review','Pending Approval','Draft'].includes(d.status)).length;
  const reviewSoon=DATA.documents.filter(d=>['warn','danger'].includes(reviewState(d.review))).length;
  const openNcr=DATA.ncr.filter(n=>n.status!=='Closed').length;
  const critNcr=DATA.ncr.filter(n=>n.sev==='Critical'&&n.status!=='Closed').length;
  const upcomingAudits=DATA.audits.filter(a=>['Scheduled','Planned','Report Due','In Progress'].includes(a.status)).length;
  const trainOverdue=DATA.training.filter(t=>t.status==='Overdue').length;

  const attn=[];
  DATA.capa.filter(c=>c.status!=='Closed'&&daysFrom(c.due)<=2).forEach(c=>attn.push({c:'danger',t:c.title,m:`${c.id} · ${c.owner}`,w:rel(c.due),open:'capa',id:c.id}));
  DATA.documents.filter(d=>reviewState(d.review)==='danger').forEach(d=>attn.push({c:'danger',t:`${d.title} — review overdue`,m:`${d.id} v${d.ver}`,w:rel(d.review),open:'documents',id:d.id}));
  DATA.ncr.filter(n=>n.sev==='Critical'&&n.status!=='Closed').forEach(n=>attn.push({c:'danger',t:`${n.title} — critical NCR`,m:`${n.id} · ${n.area}`,w:rel(n.raised),open:'ncr',id:n.id}));
  DATA.documents.filter(d=>reviewState(d.review)==='warn').forEach(d=>attn.push({c:'warn',t:`${d.title} — review due soon`,m:`${d.id} v${d.ver}`,w:rel(d.review),open:'documents',id:d.id}));
  DATA.audits.filter(a=>a.status==='Report Due').forEach(a=>attn.push({c:'warn',t:`${a.title} — report due`,m:`${a.id} · ${a.findings} findings`,w:'Overdue',open:'audits',id:a.id}));
  DATA.training.filter(t=>t.status==='Overdue').forEach(t=>attn.push({c:'warn',t:`${t.employee} — training overdue`,m:t.course,w:rel(t.due),open:'training',id:t.id}));
  attn.sort((a,b)=>(a.c==='danger'?0:1)-(b.c==='danger'?0:1));

  const capaBy=['Open','Investigation','Action in Progress','Effectiveness Check','Closed'].map(s=>({l:s,v:DATA.capa.filter(c=>c.status===s).length,c:s==='Closed'?'var(--ok)':s==='Action in Progress'?'var(--warn)':'var(--brand)'}));
  const kpi=(label,num,delta,deltaCls,ringPct,ringColor)=>`<div class="card kpi">${ringPct!=null?ring(ringPct,ringColor):''}<div class="label">${label}</div><div class="num">${num}</div>${delta?`<div class="delta ${deltaCls}">${delta}</div>`:''}</div>`;
  const nextAud=DATA.audits.filter(a=>a.status==='Scheduled').sort((a,b)=>new Date(a.date)-new Date(b.date))[0];

  return head([{t:'Dashboard'}],'Quality Dashboard','Live view of your quality system — Greenfield Biologics Ltd, Cambridge · '+fmt(TODAY),[{t:'New record',cls:'primary',icon:'＋'},{t:'My tasks'},{t:'Export'}])+`
  <div class="content">
    <div class="arch-banner"><b>Architecture view is on.</b> Chips map each surface to its backend. Every module list is the same reusable <b>QmsRecordGrid</b> PCF (JSON in / OnChange out); detail timelines are <b>QmsLifecycleTimeline</b>; action plans are <b>QmsStageChecklist</b>; charts are <b>QmsChart</b>; KPI cards are <b>QmsKpiCard</b>. KPIs aggregate SharePoint lists on load; the overdue / due-soon logic is raised by scheduled Power Automate flows.</div>
    <div class="grid kpis">
      ${kpi('Open CAPAs',openCapa,`${overdueCapa} overdue`,overdueCapa?'up':'flat')}
      ${kpi('Open nonconformances',openNcr,`${critNcr} critical`,critNcr?'up':'flat')}
      ${kpi('Docs in workflow',docsReview,`${reviewSoon} due for review`,reviewSoon?'up':'flat')}
      ${kpi('Upcoming audits',upcomingAudits,nextAud?`next ${rel(nextAud.date)}`:'—','flat')}
      ${kpi('Training compliance',TRAINING_PCT+'%',`${trainOverdue} people overdue`,trainOverdue?'up':'down',TRAINING_PCT,'var(--ok)')}
    </div>
    <div class="grid two-col section">
      <div>
        <h2>Attention required <span class="count">· ${attn.length} items need action</span></h2>
        <div class="attn">${attn.map(a=>`<div class="attn row" data-open="${a.open}" data-id="${a.id}"><span class="dot" style="background:${a.c==='danger'?'var(--danger)':'var(--warn)'}"></span><div><div class="ttl">${a.t}</div><div class="meta">${a.m}</div></div><span class="when" style="color:${a.c==='danger'?'var(--danger)':'var(--warn)'}">${a.w}</span></div>`).join('')}</div>
        ${PCF('QmsRecordGrid (PCF) — compact mode')}${FLOW('daily "QMS due-date scan" writes these alerts')}
      </div>
      <div>
        <h2>CAPA by status</h2>
        <div class="card" style="padding:16px 18px">${bars(capaBy)}</div>
        ${PCF('QmsChart (PCF)')}
      </div>
    </div>
    <div class="legend arch-block"><span><i style="background:#E0B23B"></i> SharePoint list / library</span><span><i style="background:#7FB1E0"></i> Power Automate flow</span><span><i style="background:#B79BE0"></i> PCF component (library)</span></div>
  </div>`;
}

  const compData=[{l:'Open',v:1,c:'var(--neutral)'},{l:'Investigation',v:2,c:'var(--warn)'},{l:'Closed',v:2,c:'var(--ok)'}];

  return head([{t:'Reporting & Analytics'}],'Reporting & Analytics','Quality KPIs, trends and management-review pack — built on the same SharePoint lists',[{t:'Management review pack',cls:'primary',icon:'⤓'},{t:'Open in Power BI'},{t:'Export'}])+`
  <div class="content">
    ${SP('aggregates every QMS list')}${PCF('QmsChart (PCF) — one control, multiple chart types')}${archNote('flow','⚙ Standard — Power BI connects directly to SharePoint lists')}
    <div class="arch-block" style="height:8px"></div>
    <div class="grid statrow">
      <div class="card stat"><div class="l">On-time CAPA closure</div><div class="v">91%</div><div class="s" style="color:var(--ok)">▲ 3 pts vs last month</div></div>
      <div class="card stat"><div class="l">Avg CAPA cycle time</div><div class="v">24d</div><div class="s">target ≤ 30d</div></div>
      <div class="card stat"><div class="l">Overdue items</div><div class="v">${overdueItems}</div><div class="s" style="color:var(--danger)">across CAPA, docs, training</div></div>
      <div class="card stat"><div class="l">Open audit findings</div><div class="v">4</div><div class="s">2 converted to CAPA</div></div>
    </div>
    <div class="grid charts section">
      <div class="card chartcard"><h3>On-time CAPA closure (6 months)</h3>${lineChart(onTime,'#115EA3')}<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink-4);margin-top:4px"><span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span><span>May</span><span>Jun</span></div></div>
      <div class="card chartcard"><h3>Nonconformances by area</h3>${bars(ncrArea)}</div>
      <div class="card chartcard"><h3>Audit findings by type</h3>${bars(findings)}</div>
      <div class="card chartcard"><h3>Training compliance</h3><div class="donutwrap">${donut(TRAINING_PCT,'#0E700E','compliant')}<div class="legend2"><span><i style="background:var(--ok)"></i> Compliant ${TRAINING_PCT}%</span><span><i style="background:var(--warn)"></i> Overdue ${DATA.training.filter(t=>t.status==='Overdue').length} people</span><span><i style="background:#EDEDED"></i> Upcoming assignments</span></div></div></div>
      <div class="card chartcard"><h3>Complaints by status</h3>${bars(compData)}</div>
      <div class="card chartcard"><h3>Management review</h3><div class="descbox" style="margin-bottom:12px">One-click pack pulling KPIs, overdue actions, audit findings, complaint trends and training compliance into a dated PDF for the quarterly management review.</div><button class="btn primary">⤓ Generate review pack</button></div>
    </div>
  </div>`;
}

/* ---------------- PCF Component Library ---------------- */
const COMPONENTS=[
 {name:'QmsRecordGrid',type:'Field-type PCF · JSON in / OnChange out',desc:'The workhorse list — client-side search, multi-filter, sortable columns, paging and row/command selection. One control drives every module list (and the dashboard attention list in compact mode).',inp:'items (JSON string), columns config, pageSize, selectionMode',out:'selectedId, command (via OnChange)',used:'All 11 module lists + dashboard'},
 {name:'QmsLifecycleTimeline',type:'Field-type PCF',desc:'Renders a record’s stage lifecycle (done / current / future), vertical or horizontal.',inp:'stages (JSON), currentStage',out:'stageClick (optional)',used:'Document, CAPA, NCR, Change, Audit, Supplier, Equipment, Design'},
 {name:'QmsStageChecklist',type:'Field-type PCF',desc:'Staged action / disposition / findings checklist with per-step status, owner and due.',inp:'steps (JSON)',out:'stepToggle / stepUpdate',used:'CAPA actions, NCR disposition, Audit findings, Change implementation, Risk mitigation'},
 {name:'QmsChart',type:'Field-type PCF',desc:'Bar / donut / trend chart for KPIs and analytics — the generalised "expiry / trend chart" slot.',inp:'series (JSON), chartType, colours',out:'segmentClick (drill-down)',used:'Dashboard + Reporting & Analytics'},
 {name:'QmsKpiCard',type:'Field-type PCF (or native)',desc:'Metric card with value, delta and optional ring. Borderline — native Canvas can do this; choose PCF only for the ring + consistent theming.',inp:'label, value, delta, ringPct',out:'cardClick',used:'Dashboard KPI strip, module headers'},
 {name:'QmsIntakeForm  (optional)',type:'Field-type PCF',desc:'Conditional intake form emitting a JSON payload for SharePoint Patch — your Internet Request pattern. Use only where new / amend forms have real conditional logic; otherwise native Canvas forms.',inp:'schema / config (JSON), mode',out:'payload (JSON via OnChange)',used:'Complex new / amend intakes'},
];
function componentsView(){
  return head([{t:'PCF Component Library'}],'PCF Component Library','The reusable controls this solution is built from — ThePoint.Controls namespace',[{t:'Mono-repo (pac)',cls:'primary'},{t:'Build all'}])+`
  <div class="content">
    <div class="card" style="padding:14px 18px;display:flex;gap:12px;align-items:flex-start;margin-bottom:20px;background:var(--purple-bg);border-color:#C9B6EC">
      <span style="font-size:20px">▦</span>
      <div style="font-size:13px;color:var(--ink-2)"><b>~5 components, not 12 monoliths.</b> Every module list is the same <b>QmsRecordGrid</b>; every lifecycle is <b>QmsLifecycleTimeline</b>; every action plan is <b>QmsStageChecklist</b>. Building one configurable control per pattern (rather than one per module) is what keeps this maintainable, versionable and reusable across apps. Status pills, badges and tags are plain styling inside the grid — not separate PCFs (don't pay deploy / version overhead for primitives).</div>
    </div>
    <div class="grid complibgrid">
      ${COMPONENTS.map(c=>`<div class="card complib"><div class="nm">${c.name}</div><div class="ty">${c.type}</div><div class="ds">${c.desc}</div><div class="io"><b>In:</b> ${c.inp}</div><div class="io"><b>Out:</b> ${c.out}</div><div class="used"><b>Used by:</b> ${c.used}</div></div>`).join('')}
    </div>
    <div class="card" style="padding:16px 18px;margin-top:18px">
      <h3 style="margin:0 0 12px;font-size:14px">Build & governance notes</h3>
      <div class="descbox">• <b>Field-type over dataset-type.</b> Canvas collections don't bind cleanly to dataset controls — each control accepts a JSON string from Power Fx and emits outputs via OnChange.\n• <b>Deployment.</b> All controls deploy via a Dataverse-enabled Dev / Sandbox environment with the System Customizer role (the prvCreateCustomControl wall). The app itself stays SharePoint-backed and standard-licensed — Dataverse is only needed in-environment for control deployment, not as a data source.\n• <b>Mono-repo.</b> One repo for the library; pin a single Fluent UI v9 version across all controls and share build config so pac React templates can't pull a mismatched Fluent version.\n• <b>Performance.</b> Virtualise large grids (react-window); keep updateView lean and avoid re-emitting outputs unless values actually change.</div>
    </div>
    <div class="footnote">Standard licensing throughout: SharePoint lists / libraries, standard Power Apps controls, standard Power Automate flows, Power BI for reporting. No premium connectors, custom connectors or Dataverse as a data source. PCF code components do not themselves trigger premium licensing.</div>
  </div>`;
}

/* ---------------- Router + boot ---------------- */
function render(){
  renderNav();
  const main=document.getElementById('main');
  let html;
  if(state.route==='dashboard') html=dashboardView();
  else if(state.route==='reporting') html=reportingView();
  else if(state.route==='components') html=componentsView();
  else if(MODULES[state.route]) html=state.id?MODULES[state.route].detail(state.id):renderList(state.route);
  else html=dashboardView();
  main.innerHTML=html; main.scrollTop=0; bindView();
}
function go(route,id){state.route=route;state.id=id||null;state.q='';state.sort={col:null,dir:1};state.filters={};render();}
document.addEventListener('click',e=>{
  const nav=e.target.closest('[data-nav]'); if(nav){go(nav.getAttribute('data-nav'));return;}
  const open=e.target.closest('[data-open]'); if(open){go(open.getAttribute('data-open'),open.getAttribute('data-id'));return;}
  const sort=e.target.closest('[data-sort]'); if(sort){const c=sort.getAttribute('data-sort');if(state.sort.col===c)state.sort.dir*=-1;else state.sort={col:c,dir:1};render();return;}
});
function bindView(){
  if(MODULES[state.route]&&!state.id){
    const s=document.getElementById('listSearch');
    if(s) s.addEventListener('input',()=>{state.q=s.value;render();const n=document.getElementById('listSearch');if(n){n.focus();n.setSelectionRange(n.value.length,n.value.length);}});
    MODULES[state.route].filters.forEach(flt=>{const sel=document.getElementById('flt_'+flt.key);if(sel)sel.addEventListener('change',()=>{state.filters[state.route]=state.filters[state.route]||{};state.filters[state.route][flt.key]=sel.value;render();});});
  }
}
document.getElementById('archBtn').addEventListener('click',function(){document.body.classList.toggle('show-arch');this.classList.toggle('on',document.body.classList.contains('show-arch'));});
go('dashboard');
</script>
